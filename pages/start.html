<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    .header {
      text-align: center;
      padding: 20px 10px 10px;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #333;
      flex-shrink: 0;
      position: relative;
    }
    .language-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid #000;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
    }
    .language-toggle button {
      appearance: none;
      border: 0;
      background: transparent;
      color: #666;
      padding: 8px 11px;
      font: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
    }
    .language-toggle button[aria-pressed="true"] {
      background: #000;
      color: #fff;
    }
    .image-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      overflow: hidden;
      min-height: 0; /* Important for grid item scaling */
    }
    .image-stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    solve to find your way out
    <div class="language-toggle" aria-label="Language toggle">
      <button type="button" data-lang="en" aria-pressed="false">EN</button>
      <button type="button" data-lang="fr" aria-pressed="false">FR</button>
      <button type="button" data-lang="ar" aria-pressed="true">AR</button>
    </div>
  </div>
  <div class="image-stage">
    <img id="language-image" src="" alt="Language image">
  </div>

  <script>
    const buttons = Array.from(document.querySelectorAll('.language-toggle button'));
    const image = document.getElementById('language-image');

    const languageMap = {
      en: {
        image: '/assets/alphaconnect-riddles-eng.png'
      },
      fr: {
        image: '/assets/alphaconnect-riddles-fr.png'
      },
      ar: {
        image: '/assets/alphaconnect-riddles-ar.png'
      }
    };

    function getInitialLanguage() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = (params.get('lang') || '').toLowerCase();
      if (languageMap[fromQuery]) {
        return fromQuery;
      }

      return 'ar';
    }

    function renderLanguage(lang, updateUrl) {
      const entry = languageMap[lang] || languageMap.en;
      image.src = entry.image;
      image.alt = `${lang.toUpperCase()} image`;

      buttons.forEach((button) => {
        const active = button.dataset.lang === lang;
        button.setAttribute('aria-pressed', active ? 'true' : 'false');
      });

      if (updateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        window.history.replaceState({}, '', url);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        renderLanguage(button.dataset.lang, true);
      });
    });

    renderLanguage(getInitialLanguage(), false);
  </script>
</body>
</html>
